<!DOCTYPE html><html lang="pt" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sensores</title><link rel="stylesheet" th:href="@{/css/dashboard.css}"></head><body><aside class="sidebar"><div class="brand"><div class="brand-icon">🌿</div><div><h1>IoT Room</h1><span>Qualidade ambiental</span></div></div><nav><a href="/dashboard">Dashboard</a><a href="/estacoes">Estações</a><a href="/sensores" class="active">Sensores</a><a href="/leituras">Leituras</a></nav></aside><main class="main-content"><header class="topbar"><div><h2>Sensores</h2><p>Temperatura e TDS por estação</p></div></header><section class="panel"><table><thead><tr><th>ID</th><th>Nome</th><th>Tipo</th><th>Unidade</th><th>Estação</th><th>Estado</th></tr></thead><tbody><tr th:each="s : ${sensores}"><td th:text="${s.id}">1</td><td th:text="${s.nome}">Sensor</td><td><span class="tag" th:text="${s.tipo}">Tipo</span></td><td th:text="${s.unidade}">ppm</td><td th:text="${s.estacao.nome}">Estação</td><td th:text="${s.ativo ? 'Ativo' : 'Inativo'}">Ativo</td></tr></tbody></table></section></main></body></html>
