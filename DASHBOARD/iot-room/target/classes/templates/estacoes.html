<!DOCTYPE html><html lang="pt" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Estações</title><link rel="stylesheet" th:href="@{/css/dashboard.css}"></head><body><aside class="sidebar"><div class="brand"><div class="brand-icon">🌿</div><div><h1>IoT Room</h1><span>Qualidade ambiental</span></div></div><nav><a href="/dashboard">Dashboard</a><a href="/estacoes" class="active">Estações</a><a href="/sensores">Sensores</a><a href="/leituras">Leituras</a></nav></aside><main class="main-content"><header class="topbar"><div><h2>Estações</h2><p>Gestão das estações de monitorização</p></div></header><section class="panel"><table><thead><tr><th>ID</th><th>Nome</th><th>Localização</th><th>Device ID</th><th>Estado</th><th>Criada em</th></tr></thead><tbody><tr th:each="e : ${estacoes}"><td th:text="${e.id}">1</td><td th:text="${e.nome}">Sala IoT</td><td th:text="${e.localizacao}">Lab</td><td th:text="${e.deviceId}">esp32</td><td><span class="tag" th:text="${e.ativa ? 'Ativa' : 'Inativa'}">Ativa</span></td><td th:text="${#temporals.format(e.criadaEm, 'dd/MM/yyyy HH:mm')}">Data</td></tr></tbody></table></section></main></body></html>
