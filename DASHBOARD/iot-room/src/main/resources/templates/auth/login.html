<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | IoT Room</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

<main class="auth-container">
    <section class="auth-card">
        <h1 class="auth-title">Login</h1>
        <p class="auth-subtitle">Acede à plataforma IoT Room.</p>

        <p class="auth-message error" th:if="${param.error}">
            Email ou password inválidos.
        </p>

        <p class="auth-message info" th:if="${param.logout}">
            Sessão terminada.
        </p>

        <p class="auth-message success" th:if="${param.registado}">
            Conta criada com sucesso. Faz login.
        </p>

        <form th:action="@{/auth/login}" method="post">
            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
            </div>

            <button class="auth-button" type="submit">Entrar</button>
        </form>

        <a class="auth-link" th:href="@{/auth/register}">Criar conta</a>
    </section>
</main>

</body>
</html>
