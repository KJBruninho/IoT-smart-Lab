<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Estações do Grupo</title>
</head>
<body>

<h1>Gerir estações do grupo</h1>

<h2 th:text="${grupo.nome}">Nome do grupo</h2>

<form th:action="@{/professor/grupos/{id}/estacoes(id=${grupo.id})}" method="post">

    <div th:if="${#lists.isEmpty(estacoes)}">
        <p>Não existem estações ativas.</p>
    </div>

    <div th:each="estacao : ${estacoes}">
        <label>
            <input type="checkbox"
                   name="estacaoIds"
                   th:value="${estacao.id}"
                   th:checked="${estacoesComAcesso.contains(estacao.id)}">

            <span th:text="${estacao.nome}">Nome da estação</span>
            <small th:text="'(' + ${estacao.deviceId} + ')'"></small>
        </label>
    </div>

    <br>

    <button type="submit">Guardar acessos</button>

    <a th:href="@{/professor/grupos}">Voltar</a>

</form>

</body>
</html>
