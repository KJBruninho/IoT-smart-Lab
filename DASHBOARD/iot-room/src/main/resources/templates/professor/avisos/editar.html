<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar aviso | Professor</title>
    <link rel="stylesheet" th:href="@{/css/professor.css}">
</head>
<body class="professor-page theme-auto">
<div class="professor-layout">
    <div th:replace="~{fragments/professor-sidebar :: professorSidebar('avisos')}"></div>
    <main class="professor-main">
        <header class="professor-topbar">
            <div>
                <p class="eyebrow">Área Professor</p>
                <h1>Editar aviso</h1>
                <p>Preencher mensagem do aviso.</p>
            </div>
            <div class="professor-actions"></div>
        </header>

        <section th:if="${mensagemErro}" class="alert alert-error"><span th:text="${mensagemErro}">Erro</span></section>
        <section class="professor-panel"><form method="post" th:action="@{/professor/avisos/{id}/editar(id=${avisoForm.id})}"><input type="hidden" name="id" th:value="${avisoForm != null ? avisoForm.id : ''}"><div class="form-grid"><div class="form-group"><label for="titulo">Título</label><input id="titulo" name="titulo" type="text" th:value="${avisoForm != null ? avisoForm.titulo : ''}" required></div><div class="form-group"><label for="expiraEm">Expira em</label><input id="expiraEm" name="expiraEm" type="datetime-local" th:value="${avisoForm != null ? avisoForm.expiraEm : ''}"></div><div class="form-group"><label class="checkbox-label"><input type="checkbox" name="ativo" value="true" th:checked="${avisoForm == null or avisoForm.ativo == null or avisoForm.ativo}"> Aviso ativo</label><input type="hidden" name="_ativo" value="on"></div><div class="form-group full-width"><label for="mensagem">Mensagem</label><textarea id="mensagem" name="mensagem" required th:text="${avisoForm != null ? avisoForm.mensagem : ''}"></textarea></div></div><div class="form-actions" style="margin-top:16px"><button class="btn btn-primary" type="submit">Guardar</button><a class="btn btn-secondary" th:href="@{/professor/avisos}">Cancelar</a></div></form></section>

    </main>
</div>
</body>
</html>
