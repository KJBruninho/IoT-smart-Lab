<!DOCTYPE html>
<html lang="pt-PT" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Aviso - Professor</title>
    <link rel="stylesheet" th:href="@{/css/professor.css}">
</head>
<body>

<div class="professor-layout">

    <aside class="professor-sidebar">
        <div class="sidebar-logo">IoT Room</div>

		<nav class="sidebar-nav">
		    <a th:href="@{/professor}">Dashboard</a>
		    <a th:href="@{/professor/grupos}">Grupos</a>
		    <a th:href="@{/professor/experiencias}">Experiências</a>
		    <a th:href="@{/professor/dados}">Dados e Gráficos</a>
		    <a th:href="@{/professor/avisos}" class="active">Avisos</a>
		    <a th:href="@{/professor/alertas}">Alertas</a>
		    <a th:href="@{/professor/forum}">Fórum</a>
			<a th:href="@{/professor/sensores}">Sensores</a>
		</nav>
    </aside>

    <main class="professor-main">

        <header class="professor-topbar">
            <div>
                <h1>Editar Aviso</h1>
                <p>Altera o conteúdo e o estado do aviso.</p>
            </div>
        </header>

        <section class="professor-panel">
            <form th:action="@{/professor/avisos/{id}/editar(id=${avisoForm.id})}"
                  th:object="${avisoForm}"
                  method="post"
                  class="professor-form">

                <div class="form-group">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" th:field="*{titulo}" maxlength="150" required>
                </div>

                <div class="form-group">
                    <label for="mensagem">Mensagem</label>
                    <textarea id="mensagem" th:field="*{mensagem}" rows="6" required></textarea>
                </div>

                <div class="form-group">
                    <label for="expiraEm">Data de expiração</label>
                    <input type="datetime-local" id="expiraEm" th:field="*{expiraEm}">
                    <small>Opcional. Deixa vazio se o aviso não expirar.</small>
                </div>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" th:field="*{ativo}">
                        Aviso ativo
                    </label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">
                        Guardar Alterações
                    </button>

                    <a class="btn-link" th:href="@{/professor/avisos/{id}(id=${avisoForm.id})}">
                        Cancelar
                    </a>
                </div>

            </form>
        </section>

    </main>

</div>

<script th:src="@{/js/professor.js}"></script>
</body>
</html>
