<!DOCTYPE html>
<html lang="pt-PT" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ver Aviso - Professor</title>
    <link rel="stylesheet" th:href="@{/css/professor.css}">
</head>
<body>

<div class="professor-layout">

    <aside class="professor-sidebar">
        <div class="sidebar-logo">IoT Room</div>

		<nav class="sidebar-nav">
		    <a th:href="@{/professor}">Dashboard</a>
		    <a th:href="@{/professor/grupos}">Grupos</a>
		    <a th:href="@{/professor/experiencias}">Experiências</a>
		    <a th:href="@{/professor/dados}">Dados e Gráficos</a>
		    <a th:href="@{/professor/avisos}" class="active">Avisos</a>
		    <a th:href="@{/professor/alertas}">Alertas</a>
		    <a th:href="@{/professor/forum}">Fórum</a>
			<a th:href="@{/professor/sensores}">Sensores</a>
		</nav>
    </aside>

    <main class="professor-main">

        <header class="professor-topbar">
            <div>
                <h1 th:text="${aviso.titulo}">Título do aviso</h1>
                <p>Detalhes do aviso selecionado.</p>
            </div>

            <a class="btn-primary" th:href="@{/professor/avisos/{id}/editar(id=${aviso.id})}">
                Editar Aviso
            </a>
        </header>

        <section class="professor-panel">

            <div class="details-grid">

                <div class="detail-item">
                    <span>Título</span>
                    <strong th:text="${aviso.titulo}">Aviso</strong>
                </div>

                <div class="detail-item">
                    <span>Estado</span>

                    <strong th:if="${aviso.ativo}" class="text-success">
                        Ativo
                    </strong>

                    <strong th:if="${!aviso.ativo}" class="text-danger">
                        Inativo
                    </strong>
                </div>

                <div class="detail-item">
                    <span>Criado em</span>
                    <strong th:text="${aviso.criadoEm != null ? #temporals.format(aviso.criadoEm, 'dd/MM/yyyy HH:mm') : '-'}">
                        -
                    </strong>
                </div>

                <div class="detail-item">
                    <span>Expira em</span>
                    <strong th:text="${aviso.expiraEm != null ? #temporals.format(aviso.expiraEm, 'dd/MM/yyyy HH:mm') : 'Sem expiração'}">
                        Sem expiração
                    </strong>
                </div>

            </div>

            <div class="description-box">
                <h2>Mensagem</h2>
                <p th:text="${aviso.mensagem}">
                    Mensagem do aviso.
                </p>
            </div>

            <div class="form-actions">

                <form th:action="@{/professor/avisos/{id}/alternar-estado(id=${aviso.id})}" method="post">
                    <button type="submit"
                            class="btn-small btn-warning"
                            th:text="${aviso.ativo ? 'Desativar Aviso' : 'Ativar Aviso'}">
                        Alterar Estado
                    </button>
                </form>

                <a class="btn-link" th:href="@{/professor/avisos}">
                    Voltar aos avisos
                </a>

            </div>

        </section>

    </main>

</div>

<script th:src="@{/js/professor.js}"></script>
</body>
</html>
