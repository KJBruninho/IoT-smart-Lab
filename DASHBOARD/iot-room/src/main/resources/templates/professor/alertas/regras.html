<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regras de alerta | Professor</title>
    <link rel="stylesheet" th:href="@{/css/professor.css}">
</head>
<body class="professor-page theme-auto">
<div class="professor-layout">
    <div th:replace="~{fragments/professor-sidebar :: professorSidebar('alertas')}"></div>
    <main class="professor-main">
        <header class="professor-topbar">
            <div>
                <p class="eyebrow">Área Professor</p>
                <h1>Regras de alerta</h1>
                <p>Limites e condições para gerar alertas.</p>
            </div>
            <div class="professor-actions"><a class="btn btn-primary" th:href="@{/professor/alertas/regras/nova}">Nova regra</a></div>
        </header>

        <section class="professor-panel"><div class="empty-state" th:if="${regras == null or #lists.isEmpty(regras)}">Sem regras.</div><div class="table-wrap" th:if="${regras != null and !#lists.isEmpty(regras)}"><table class="professor-table"><thead><tr><th>Título</th><th>Tipo</th><th>Operador</th><th>Limites</th><th>Estado</th><th>Ações</th></tr></thead><tbody><tr th:each="regra : ${regras}"><td><strong th:text="${regra.titulo}">Regra</strong><small th:text="${regra.mensagem}">Mensagem</small></td><td th:text="${regra.tipoSensor}">Tipo</td><td th:text="${regra.operador}">Operador</td><td><span th:text="${regra.valorMin}">Min</span> / <span th:text="${regra.valorMax}">Max</span></td><td><span class="status-pill" th:text="${regra.ativo ? 'Ativa' : 'Inativa'}">Estado</span></td><td class="table-actions"><a class="btn btn-secondary" th:href="@{/professor/alertas/regras/{id}/editar(id=${regra.id})}">Editar</a><form method="post" th:action="@{/professor/alertas/regras/{id}/alternar-estado(id=${regra.id})}"><button class="btn btn-warning" type="submit">Alternar</button></form></td></tr></tbody></table></div></section>

    </main>
</div>
</body>
</html>
