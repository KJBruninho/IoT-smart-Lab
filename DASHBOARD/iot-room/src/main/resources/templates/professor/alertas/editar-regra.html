<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar regra | Professor</title>
    <link rel="stylesheet" th:href="@{/css/professor.css}">
</head>
<body class="professor-page theme-auto">
<div class="professor-layout">
    <div th:replace="~{fragments/professor-sidebar :: professorSidebar('alertas')}"></div>
    <main class="professor-main">
        <header class="professor-topbar">
            <div>
                <p class="eyebrow">Área Professor</p>
                <h1>Editar regra</h1>
                <p>Configurar limites e severidade.</p>
            </div>
            <div class="professor-actions"></div>
        </header>

        <section class="professor-panel"><form method="post" th:action="@{/professor/alertas/regras/{id}/editar(id=${regraForm.id})}"><input type="hidden" name="id" th:value="${regraForm != null ? regraForm.id : ''}"><div class="form-grid"><div class="form-group"><label for="grupoId">Grupo</label><select id="grupoId" name="grupoId"><option value="">Todos</option><option th:each="grupo : ${grupos}" th:value="${grupo.id}" th:selected="${regraForm != null and regraForm.grupoId == grupo.id}" th:text="${grupo.nome}">Grupo</option></select></div><div class="form-group"><label for="experienciaId">Experiência</label><select id="experienciaId" name="experienciaId"><option value="">Todas</option><option th:each="experiencia : ${experiencias}" th:value="${experiencia.id}" th:selected="${regraForm != null and regraForm.experienciaId == experiencia.id}" th:text="${experiencia.nome}">Experiência</option></select></div><div class="form-group"><label for="estacaoId">Estação</label><select id="estacaoId" name="estacaoId"><option value="">Todas</option><option th:each="estacao : ${estacoes}" th:value="${estacao.id}" th:selected="${regraForm != null and regraForm.estacaoId == estacao.id}" th:text="${estacao.nome}">Estação</option></select></div><div class="form-group"><label for="tipoSensor">Tipo sensor</label><input id="tipoSensor" name="tipoSensor" th:value="${regraForm != null ? regraForm.tipoSensor : ''}" required></div><div class="form-group"><label for="operador">Operador</label><input id="operador" name="operador" th:value="${regraForm != null ? regraForm.operador : ''}" placeholder=">, <, ENTRE"></div><div class="form-group"><label for="severidade">Severidade</label><select id="severidade" name="severidade"><option value="AVISO" th:selected="${regraForm == null or regraForm.severidade == 'AVISO'}">Aviso</option><option value="CRITICO" th:selected="${regraForm != null and regraForm.severidade == 'CRITICO'}">Crítico</option></select></div><div class="form-group"><label for="valorMin">Valor mínimo</label><input id="valorMin" name="valorMin" type="number" step="0.0001" th:value="${regraForm != null ? regraForm.valorMin : ''}"></div><div class="form-group"><label for="valorMax">Valor máximo</label><input id="valorMax" name="valorMax" type="number" step="0.0001" th:value="${regraForm != null ? regraForm.valorMax : ''}"></div><div class="form-group"><label for="cooldownMinutos">Cooldown</label><input id="cooldownMinutos" name="cooldownMinutos" type="number" th:value="${regraForm != null ? regraForm.cooldownMinutos : 10}"></div><div class="form-group"><label class="checkbox-label"><input type="checkbox" name="ativo" value="true" th:checked="${regraForm == null or regraForm.ativo == null or regraForm.ativo}"> Ativa</label><input type="hidden" name="_ativo" value="on"></div><div class="form-group full-width"><label for="titulo">Título</label><input id="titulo" name="titulo" th:value="${regraForm != null ? regraForm.titulo : ''}" required></div><div class="form-group full-width"><label for="mensagem">Mensagem</label><textarea id="mensagem" name="mensagem" th:text="${regraForm != null ? regraForm.mensagem : ''}"></textarea></div></div><div class="form-actions" style="margin-top:16px"><button class="btn btn-primary" type="submit">Guardar</button><a class="btn btn-secondary" th:href="@{/professor/alertas/regras}">Cancelar</a></div></form></section>

    </main>
</div>
</body>
</html>
