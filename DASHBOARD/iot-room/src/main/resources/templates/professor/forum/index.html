<!DOCTYPE html>
<html lang="pt-PT" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fórum - Professor</title>
    <link rel="stylesheet" th:href="@{/css/professor.css}">
</head>
<body>

<div class="professor-layout">

    <aside class="professor-sidebar">
        <div class="sidebar-logo">IoT Room</div>

		<nav class="sidebar-nav">
		    <a th:href="@{/professor}">Dashboard</a>
		    <a th:href="@{/professor/grupos}">Grupos</a>
		    <a th:href="@{/professor/experiencias}">Experiências</a>
		    <a th:href="@{/professor/dados}">Dados e Gráficos</a>
		    <a th:href="@{/professor/avisos}">Avisos</a>
		    <a th:href="@{/professor/alertas}">Alertas</a>
		    <a th:href="@{/professor/forum}" class="active">Fórum</a>
		</nav>
    </aside>

    <main class="professor-main">

        <header class="professor-topbar">
            <div>
                <h1>Fórum</h1>
                <p>Gestão de tópicos, perguntas e respostas.</p>
            </div>

            <a class="btn-primary" th:href="@{/professor/forum/novo}">
                Criar Tópico
            </a>
        </header>

        <section class="professor-panel">
            <div class="panel-header">
                <h2>Tópicos</h2>
            </div>

            <div th:if="${#lists.isEmpty(topicos)}" class="empty-state">
                Ainda não existem tópicos criados.
            </div>

            <div th:if="${!#lists.isEmpty(topicos)}" class="table-wrapper">
                <table class="professor-table">
                    <thead>
                    <tr>
                        <th>Título</th>
                        <th>Grupo</th>
                        <th>Experiência</th>
                        <th>Estado</th>
                        <th>Criado em</th>
                        <th>Ações</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="topico : ${topicos}">
                        <td th:text="${topico.titulo}">Título</td>

                        <td th:text="${topico.grupoId != null && nomesGrupos[topico.grupoId] != null ? nomesGrupos[topico.grupoId] : '-'}">
                            Grupo
                        </td>

                        <td th:text="${topico.experienciaId != null && nomesExperiencias[topico.experienciaId] != null ? nomesExperiencias[topico.experienciaId] : '-'}">
                            Experiência
                        </td>

                        <td>
                            <span th:if="${topico.estado == 'ABERTO'}" class="status-badge status-active">
                                Aberto
                            </span>

                            <span th:if="${topico.estado == 'FECHADO'}" class="status-badge status-inactive">
                                Fechado
                            </span>
                        </td>

                        <td th:text="${topico.criadoEm != null ? #temporals.format(topico.criadoEm, 'dd/MM/yyyy HH:mm') : '-'}">
                            -
                        </td>

                        <td class="actions-cell">
                            <a class="btn-small" th:href="@{/professor/forum/{id}(id=${topico.id})}">
                                Ver
                            </a>

                            <a th:if="${topico.estado == 'ABERTO'}"
                               class="btn-small btn-secondary"
                               th:href="@{/professor/forum/{id}/editar(id=${topico.id})}">
                                Editar
                            </a>

                            <form th:if="${topico.estado == 'ABERTO'}"
                                  th:action="@{/professor/forum/{id}/fechar(id=${topico.id})}"
                                  method="post">
                                <button type="submit" class="btn-small btn-warning">
                                    Fechar
                                </button>
                            </form>

                            <form th:if="${topico.estado == 'FECHADO'}"
                                  th:action="@{/professor/forum/{id}/reabrir(id=${topico.id})}"
                                  method="post">
                                <button type="submit" class="btn-small">
                                    Reabrir
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

</div>

<script th:src="@{/js/professor.js}"></script>
</body>
</html>
