<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tópico | Professor</title>
    <link rel="stylesheet" th:href="@{/css/professor.css}">
</head>
<body class="professor-page theme-auto">
<div class="professor-layout">
    <div th:replace="~{fragments/professor-sidebar :: professorSidebar('forum')}"></div>
    <main class="professor-main">
        <header class="professor-topbar">
            <div>
                <p class="eyebrow">Área Professor</p>
                <h1>Tópico</h1>
                <p>Discussão do fórum.</p>
            </div>
            <div class="professor-actions"><a class="btn btn-secondary" th:href="@{/professor/forum}">Voltar</a></div>
        </header>

        <section class="professor-panel" th:if="${topico != null}"><div class="panel-header"><div><h2 th:text="${topico.titulo}">Tópico</h2><p th:text="${topico.mensagem}">Mensagem</p></div><span class="status-pill" th:text="${topico.estado}">Estado</span></div><div class="professor-actions"><a class="btn btn-secondary" th:href="@{/professor/forum/{id}/editar(id=${topico.id})}">Editar</a><form method="post" th:action="@{/professor/forum/{id}/fechar(id=${topico.id})}"><button class="btn btn-warning" type="submit">Fechar</button></form><form method="post" th:action="@{/professor/forum/{id}/reabrir(id=${topico.id})}"><button class="btn btn-success" type="submit">Reabrir</button></form></div></section>
        <section class="professor-panel"><div class="panel-header"><h2>Respostas</h2></div><div class="empty-state" th:if="${respostas == null or #lists.isEmpty(respostas)}">Sem respostas.</div><div class="card-grid" th:if="${respostas != null and !#lists.isEmpty(respostas)}"><article class="info-card" th:each="resposta : ${respostas}"><p th:text="${resposta.mensagem}">Resposta</p><small th:text="${resposta.criadoEm != null ? #temporals.format(resposta.criadoEm, 'dd/MM/yyyy HH:mm') : '-'}">-</small></article></div></section>
        <section class="professor-panel" th:if="${topico != null}"><div class="panel-header"><h2>Responder</h2></div><form method="post" th:action="@{/professor/forum/{id}/responder(id=${topico.id})}"><div class="form-group"><label for="mensagem">Mensagem</label><textarea id="mensagem" name="mensagem" required></textarea></div><div class="form-actions" style="margin-top:16px"><button class="btn btn-primary" type="submit">Enviar resposta</button></div></form></section>

    </main>
</div>
</body>
</html>
