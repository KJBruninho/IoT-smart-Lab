<!DOCTYPE html>
<html lang="pt-PT" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Tópico - Professor</title>
    <link rel="stylesheet" th:href="@{/css/professor.css}">
</head>
<body>

<div class="professor-layout">

    <aside class="professor-sidebar">
        <div class="sidebar-logo">IoT Room</div>

		<nav class="sidebar-nav">
		    <a th:href="@{/professor}">Dashboard</a>
		    <a th:href="@{/professor/grupos}">Grupos</a>
		    <a th:href="@{/professor/experiencias}">Experiências</a>
		    <a th:href="@{/professor/dados}">Dados e Gráficos</a>
		    <a th:href="@{/professor/avisos}">Avisos</a>
		    <a th:href="@{/professor/alertas}">Alertas</a>
		    <a th:href="@{/professor/forum}" class="active">Fórum</a>
			<a th:href="@{/professor/sensores}">Sensores</a>
		</nav>
    </aside>

    <main class="professor-main">

        <header class="professor-topbar">
            <div>
                <h1>Criar Tópico</h1>
                <p>Cria uma pergunta, discussão ou nota relacionada com grupos e experiências.</p>
            </div>
        </header>

        <section class="professor-panel">
            <form th:action="@{/professor/forum/novo}"
                  th:object="${topicoForm}"
                  method="post"
                  class="professor-form">

                <div class="form-group">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" th:field="*{titulo}" maxlength="150" required>
                </div>

                <div class="form-group">
                    <label for="grupoId">Grupo</label>
                    <select id="grupoId" th:field="*{grupoId}">
                        <option value="">Sem grupo associado</option>
                        <option th:each="grupo : ${grupos}"
                                th:value="${grupo.id}"
                                th:text="${grupo.nome}">
                            Grupo
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="experienciaId">Experiência</label>
                    <select id="experienciaId" th:field="*{experienciaId}">
                        <option value="">Sem experiência associada</option>
                        <option th:each="experiencia : ${experiencias}"
                                th:value="${experiencia.id}"
                                th:text="${experiencia.nome}">
                            Experiência
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="mensagem">Mensagem</label>
                    <textarea id="mensagem" th:field="*{mensagem}" rows="7" required></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">
                        Criar Tópico
                    </button>

                    <a class="btn-link" th:href="@{/professor/forum}">
                        Cancelar
                    </a>
                </div>

            </form>
        </section>

    </main>

</div>

<script th:src="@{/js/professor.js}"></script>
</body>
</html>
