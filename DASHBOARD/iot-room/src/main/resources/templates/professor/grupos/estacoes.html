<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estações do grupo | Professor</title>
    <link rel="stylesheet" th:href="@{/css/professor.css}">
</head>
<body class="professor-page theme-auto">
<div class="professor-layout">
    <div th:replace="~{fragments/professor-sidebar :: professorSidebar('grupos')}"></div>
    <main class="professor-main">
        <header class="professor-topbar">
            <div>
                <p class="eyebrow">Área Professor</p>
                <h1>Estações do grupo</h1>
                <p>Permissões de acesso a estações.</p>
            </div>
            <div class="professor-actions"><a class="btn btn-secondary" th:href="@{/professor/grupos}">Voltar</a></div>
        </header>

        <section class="professor-panel" th:if="${grupo != null}"><h2 th:text="${grupo.nome}">Grupo</h2><form method="post" th:action="@{/professor/grupos/{id}/estacoes(id=${grupo.id})}"><div class="selection-grid"><label class="selection-card" th:each="estacao : ${estacoes}"><input type="checkbox" name="estacaoIds" th:value="${estacao.id}" th:checked="${estacoesComAcesso != null and estacoesComAcesso.contains(estacao.id)}"><span th:text="${estacao.nome}">Estação</span><small th:text="${estacao.deviceId}">Device</small></label></div><div class="form-actions" style="margin-top:16px"><button class="btn btn-primary" type="submit">Guardar permissões</button></div></form></section>

    </main>
</div>
</body>
</html>
