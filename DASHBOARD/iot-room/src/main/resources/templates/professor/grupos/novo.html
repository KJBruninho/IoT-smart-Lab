<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo grupo | Professor</title>
    <link rel="stylesheet" th:href="@{/css/professor.css}">
</head>
<body class="professor-page theme-auto">
<div class="professor-layout">
    <div th:replace="~{fragments/professor-sidebar :: professorSidebar('grupos')}"></div>
    <main class="professor-main">
		<div th:replace="~{fragments/global-alerts :: alerts}"></div>
		<div th:replace="~{fragments/app-user-topbar :: topbar('Área Admin', ${paginaAtual})}"></div>
        <header class="professor-topbar">
            <div>
                <p class="eyebrow">Área Professor</p>
                <h1>Novo grupo</h1>
                <p>Dados do grupo.</p>
            </div>
            <div class="professor-actions"></div>
        </header>

        <section class="professor-panel">
            <form method="post" th:action="@{/professor/grupos/novo}">
                <input type="hidden" name="id" th:value="${grupoForm != null ? grupoForm.id : ''}">
                <div class="form-grid">
                    <div class="form-group"><label for="nome">Nome</label><input id="nome" name="nome" type="text" th:value="${grupoForm != null ? grupoForm.nome : ''}" required></div>
                    <div class="form-group"><label class="checkbox-label"><input type="checkbox" name="ativo" value="true" th:checked="${grupoForm == null or grupoForm.ativo == null or grupoForm.ativo}"> Grupo ativo</label><input type="hidden" name="_ativo" value="on"></div>
                    <div class="form-group full-width"><label for="descricao">Descrição</label><textarea id="descricao" name="descricao" th:text="${grupoForm != null ? grupoForm.descricao : ''}"></textarea></div>
                </div>
                <div class="form-actions" style="margin-top:16px"><button class="btn btn-primary" type="submit">Guardar</button><a class="btn btn-secondary" th:href="@{/professor/grupos}">Cancelar</a></div>
            </form>
        </section>

    </main>
</div>
</body>
</html>
