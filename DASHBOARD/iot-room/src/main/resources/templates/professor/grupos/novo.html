<!DOCTYPE html>
<html lang="pt-PT" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Grupo - Professor</title>
    <link rel="stylesheet" th:href="@{/css/professor.css}">
</head>
<body>

<div class="professor-layout">

    <aside class="professor-sidebar">
        <div class="sidebar-logo">IoT Room</div>

		<nav class="sidebar-nav">
		    <a th:href="@{/professor}">Dashboard</a>
		    <a th:href="@{/professor/grupos}" class="active">Grupos</a>
		    <a th:href="@{/professor/experiencias}">Experiências</a>
		    <a th:href="@{/professor/dados}">Dados e Gráficos</a>
		    <a th:href="@{/professor/avisos}">Avisos</a>
		    <a th:href="@{/professor/alertas}">Alertas</a>
		    <a th:href="@{/professor/forum}">Fórum</a>
			<a th:href="@{/professor/sensores}">Sensores</a>
		</nav>
    </aside>

    <main class="professor-main">

        <header class="professor-topbar">
            <div>
                <h1>Criar Grupo</h1>
                <p>Cria um novo grupo associado ao professor.</p>
            </div>
        </header>

        <section class="professor-panel">
            <form th:action="@{/professor/grupos/novo}" th:object="${grupoForm}" method="post" class="professor-form">

                <div class="form-group">
                    <label for="nome">Nome do grupo</label>
                    <input type="text" id="nome" th:field="*{nome}" maxlength="100" required>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao" th:field="*{descricao}" rows="5"></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">
                        Criar Grupo
                    </button>

                    <a class="btn-link" th:href="@{/professor/grupos}">
                        Cancelar
                    </a>
                </div>

            </form>
        </section>

    </main>

</div>

<script th:src="@{/js/professor.js}"></script>
</body>
</html>
