<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos de sensores | Professor</title>
    <link rel="stylesheet" th:href="@{/css/professor.css}">
</head>
<body class="professor-page theme-auto">
<div class="professor-layout">
    <div th:replace="~{fragments/professor-sidebar :: professorSidebar('sensores')}"></div>
    <main class="professor-main">
        <header class="professor-topbar">
            <div>
                <p class="eyebrow">Área Professor</p>
                <h1>Pedidos de sensores</h1>
                <p>Pedidos de alteração de configuração.</p>
            </div>
            <div class="professor-actions"><a class="btn btn-secondary" th:href="@{/professor/sensores}">Sensores</a></div>
        </header>

        <section class="professor-panel"><div class="empty-state" th:if="${pedidos == null or #lists.isEmpty(pedidos)}">Sem pedidos pendentes.</div><div class="card-grid" th:if="${pedidos != null and !#lists.isEmpty(pedidos)}"><article class="info-card" th:each="pedido : ${pedidos}"><p th:text="${pedido}">Pedido</p><form method="post" th:action="@{/professor/sensores/pedidos/{id}/aprovar(id=${pedido.id})}"><textarea name="respostaProfessor" placeholder="Resposta opcional"></textarea><button class="btn btn-success" type="submit">Aprovar</button></form><form method="post" th:action="@{/professor/sensores/pedidos/{id}/rejeitar(id=${pedido.id})}"><textarea name="respostaProfessor" placeholder="Resposta opcional"></textarea><button class="btn btn-danger" type="submit">Rejeitar</button></form></article></div></section>

    </main>
</div>
</body>
</html>
