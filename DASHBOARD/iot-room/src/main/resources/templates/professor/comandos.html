<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor | Comandos</title>
    <link rel="stylesheet" th:href="@{/css/professor.css}">
</head>
<body class="professor-page theme-auto">

<div th:replace="~{fragments/app-nav :: appNav('professor')}"></div>

<div class="professor-layout">
    <div th:replace="~{fragments/professor-sidebar :: professorSidebar('comandos')}"></div>

    <main class="professor-main">
        <header class="professor-topbar professor-topbar-actions">
            <div>
                <h1>Comandos</h1>
                <p>Histórico de comandos enviados aos sensores autorizados.</p>
            </div>
            
        </header>

        <section th:if="${mensagemSucesso}" class="alert alert-success">
            <span th:text="${mensagemSucesso}">Operação concluída.</span>
        </section>

        <section th:if="${mensagemErro}" class="alert alert-error">
            <span th:text="${mensagemErro}">Erro ao executar operação.</span>
        </section>

        <section class="professor-panel">
            <form class="filter-form filter-form-wide" th:action="@{/professor/comandos}" method="get">
                <div class="form-group">
                    <label for="termo">Pesquisar</label>
                    <input id="termo" name="termo" type="text" th:value="${termo}" placeholder="Comando, estado ou resposta">
                </div>
                <div class="form-group">
                    <label for="estado">Estado</label>
                    <select id="estado" name="estado">
                        <option value="">Todos</option>
                        <option value="ENVIADO" th:selected="${estado == 'ENVIADO'}">Enviado</option>
                        <option value="CONFIRMADO" th:selected="${estado == 'CONFIRMADO'}">Confirmado</option>
                        <option value="ERRO" th:selected="${estado == 'ERRO'}">Erro</option>
                    </select>
                </div>
                <div class="filter-actions">
                    <button class="btn btn-primary" type="submit">Filtrar</button>
                    <a class="btn btn-secondary" th:href="@{/professor/comandos}">Limpar</a>
                </div>
            </form>
        </section>

        <section class="professor-panel margin-top">
            <div class="panel-header">
                <div>
                    <h2>Comandos enviados</h2>
                    <p class="muted">Histórico de comandos enviados aos ESP32 autorizados.</p>
                </div>
                <span class="muted">Total: <strong th:text="${comandos != null ? #lists.size(comandos) : 0}">0</strong></span>
            </div>

            <div class="empty-state" th:if="${comandos == null or #lists.isEmpty(comandos)}">
                Nenhum comando encontrado.
            </div>

            <table class="professor-table" th:if="${comandos != null and !#lists.isEmpty(comandos)}">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Comando</th>
                    <th>Estado</th>
                    <th>Data</th>
                    <th>Resposta</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="comando : ${comandos}">
                    <td><strong>#<span th:text="${comando.id}">1</span></strong></td>
                    <td class="command-cell"><code th:text="${comando.comando}">COMANDO</code></td>
                    <td><span class="badge badge-info" th:text="${comando.estado}">ENVIADO</span></td>
                    <td class="muted" th:text="${comando.criadoEm != null ? comando.criadoEm : '-'}">-</td>
                    <td class="muted" th:text="${comando.resposta != null && !comando.resposta.isBlank() ? comando.resposta : '-'}">Resposta</td>
                </tr>
                </tbody>
            </table>
        </section>

    </main>
</div>

</body>
</html>
