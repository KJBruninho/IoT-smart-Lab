<!DOCTYPE html>
<html lang="pt-PT" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Grupos - Professor</title>
    <link rel="stylesheet" th:href="@{/css/professor.css}">
</head>
<body>

<div class="professor-layout">

    <aside class="professor-sidebar">
        <div class="sidebar-logo">IoT Room</div>

        <nav class="sidebar-nav">
            <a th:href="@{/professor}">Dashboard</a>
            <a th:href="@{/professor/grupos}" class="active">Grupos</a>
            <a th:href="@{/professor/experiencias}">Experiências</a>
            <a th:href="@{/professor/dados}">Dados e Gráficos</a>
            <a th:href="@{/professor/avisos}">Avisos</a>
            <a th:href="@{/professor/alertas}">Alertas</a>
            <a th:href="@{/professor/forum}">Fórum</a>
        </nav>
    </aside>

    <main class="professor-main">
        <header class="professor-topbar">
            <div>
                <h1>Grupos</h1>
                <p>Gestão dos grupos associados ao professor.</p>
            </div>
        </header>

        <section class="professor-panel">
            <div class="panel-header">
                <h2>Os Meus Grupos</h2>

                <a class="btn-primary" th:href="@{/professor/grupos/novo}">
                    Criar Grupo
                </a>
            </div>

            <div th:if="${mensagemSucesso}" class="alert-success">
                <p th:text="${mensagemSucesso}">Operação realizada com sucesso.</p>
            </div>

            <div th:if="${mensagemErro}" class="alert-error">
                <p th:text="${mensagemErro}">Ocorreu um erro.</p>
            </div>

            <div th:if="${#lists.isEmpty(grupos)}">
                <p>Ainda não existem grupos associados.</p>
            </div>

            <table class="professor-table" th:if="${!#lists.isEmpty(grupos)}">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="grupo : ${grupos}">
                        <td th:text="${grupo.id}">1</td>
                        <td th:text="${grupo.nome}">Nome do grupo</td>
                        <td>
                            <a th:href="@{/professor/grupos/{id}/estacoes(id=${grupo.id})}">
                                Gerir estações
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

</div>

<script th:src="@{/js/professor.js}"></script>
</body>
</html>
