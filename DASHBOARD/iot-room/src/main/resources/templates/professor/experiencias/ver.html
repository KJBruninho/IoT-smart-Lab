<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhe da experiência | Professor</title>
    <link rel="stylesheet" th:href="@{/css/professor.css}">
</head>
<body class="professor-page theme-auto">
<div class="professor-layout">
    <div th:replace="~{fragments/professor-sidebar :: professorSidebar('experiencias')}"></div>
    <main class="professor-main">
		<div th:replace="~{fragments/app-user-topbar :: topbar('Área Admin', ${paginaAtual})}"></div>
        <header class="professor-topbar">
            <div>
                <p class="eyebrow">Área Professor</p>
                <h1>Detalhe da experiência</h1>
                <p>Acompanhar estado e estações associadas.</p>
            </div>
            <div class="professor-actions"><a class="btn btn-secondary" th:href="@{/professor/experiencias}">Voltar</a></div>
        </header>

        <section class="professor-panel" th:if="${experiencia != null}">
            <div class="panel-header"><div><h2 th:text="${experiencia.nome}">Experiência</h2><p th:text="${experiencia.descricao}">Descrição</p></div><span class="status-pill" th:text="${experiencia.estado}">Estado</span></div>
            <div class="detail-grid">
                <div><span>Grupo</span><strong th:text="${nomesGrupos != null ? nomesGrupos[experiencia.grupoId] : experiencia.grupoId}">Grupo</strong></div>
                <div><span>Início</span><strong th:text="${experiencia.dataInicio != null ? #temporals.format(experiencia.dataInicio, 'dd/MM/yyyy HH:mm') : '-'}">-</strong></div>
                <div><span>Fim</span><strong th:text="${experiencia.dataFim != null ? #temporals.format(experiencia.dataFim, 'dd/MM/yyyy HH:mm') : '-'}">-</strong></div>
            </div>
            <div class="professor-actions" style="margin-top:16px">
                <a class="btn btn-secondary" th:href="@{/professor/experiencias/{id}/editar(id=${experiencia.id})}">Editar</a>
                <form method="post" th:action="@{/professor/experiencias/{id}/iniciar(id=${experiencia.id})}"><button class="btn btn-success" type="submit">Iniciar</button></form>
                <form method="post" th:action="@{/professor/experiencias/{id}/finalizar(id=${experiencia.id})}"><button class="btn btn-warning" type="submit">Finalizar</button></form>
                <form method="post" th:action="@{/professor/experiencias/{id}/cancelar(id=${experiencia.id})}"><button class="btn btn-danger" type="submit">Cancelar</button></form>
            </div>
        </section>
        <section class="professor-panel" th:if="${experiencia != null}">
            <div class="panel-header"><h2>Estações associadas</h2></div>
            <div class="empty-state" th:if="${estacoesAssociadas == null or #lists.isEmpty(estacoesAssociadas)}">Sem estações associadas.</div>
            <div class="card-grid" th:if="${estacoesAssociadas != null and !#lists.isEmpty(estacoesAssociadas)}"><article class="info-card" th:each="item : ${estacoesAssociadas}"><p th:text="${item}">Estação</p></article></div>
            <form method="post" th:action="@{/professor/experiencias/{id}/estacoes/adicionar(id=${experiencia.id})}" class="inline-form" style="margin-top:16px">
                <select name="estacaoId"><option value="">Selecionar estação</option><option th:each="estacao : ${estacoesDisponiveis}" th:value="${estacao.id}" th:text="${estacao.nome}">Estação</option></select>
                <input type="number" name="ordem" placeholder="Ordem">
                <input type="text" name="observacao" placeholder="Observação">
                <button class="btn btn-primary" type="submit">Associar</button>
            </form>
        </section>

    </main>
</div>

</body>
</html>
