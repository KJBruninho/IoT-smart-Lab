<!DOCTYPE html>
<html lang="pt-PT" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nova Experiência - Professor</title>
    <link rel="stylesheet" th:href="@{/css/professor.css}">
</head>
<body>

<div class="professor-layout">

    <aside class="professor-sidebar">
        <div class="sidebar-logo">IoT Room</div>

		<nav class="sidebar-nav">
		    <a th:href="@{/professor}">Dashboard</a>
		    <a th:href="@{/professor/grupos}">Grupos</a>
		    <a th:href="@{/professor/experiencias}" class="active">Experiências</a>
		    <a th:href="@{/professor/dados}">Dados e Gráficos</a>
		    <a th:href="@{/professor/avisos}">Avisos</a>
		    <a th:href="@{/professor/alertas}">Alertas</a>
		    <a th:href="@{/professor/forum}">Fórum</a>
		</nav>
    </aside>

    <main class="professor-main">

        <header class="professor-topbar">
            <div>
                <h1>Criar Experiência</h1>
                <p>Cria uma nova experiência associada a um grupo.</p>
            </div>
        </header>

        <section class="professor-panel">
            <form th:action="@{/professor/experiencias/nova}"
                  th:object="${experienciaForm}"
                  method="post"
                  class="professor-form">

                <div class="form-group">
                    <label for="nome">Nome da experiência</label>
                    <input type="text" id="nome" th:field="*{nome}" maxlength="120" required>
                </div>

                <div class="form-group">
                    <label for="grupoId">Grupo</label>
                    <select id="grupoId" th:field="*{grupoId}" required>
                        <option value="">Selecionar grupo</option>
                        <option th:each="grupo : ${grupos}"
                                th:value="${grupo.id}"
                                th:text="${grupo.nome}">
                            Grupo
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao" th:field="*{descricao}" rows="5"></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">
                        Criar Experiência
                    </button>

                    <a class="btn-link" th:href="@{/professor/experiencias}">
                        Cancelar
                    </a>
                </div>

            </form>
        </section>

    </main>

</div>

<script th:src="@{/js/professor.js}"></script>
</body>
</html>
