<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova experiência | Professor</title>
    <link rel="stylesheet" th:href="@{/css/professor.css}">
</head>
<body class="professor-page theme-auto">
<div class="professor-layout">
    <div th:replace="~{fragments/professor-sidebar :: professorSidebar('experiencias')}"></div>
    <main class="professor-main">
		<div th:replace="~{fragments/global-alerts :: alerts}"></div>
		<div th:replace="~{fragments/app-user-topbar :: topbar('Área Admin', ${paginaAtual})}"></div>
        <header class="professor-topbar">
            <div>
                <p class="eyebrow">Área Professor</p>
                <h1>Nova experiência</h1>
                <p>Dados principais da experiência.</p>
            </div>
            <div class="professor-actions"></div>
        </header>

        <section class="professor-panel">
            <form method="post" th:action="@{/professor/experiencias/nova}">
                <input type="hidden" name="id" th:value="${experienciaForm != null ? experienciaForm.id : ''}">
                <div class="form-grid">
                    <div class="form-group"><label for="nome">Nome</label><input id="nome" name="nome" type="text" th:value="${experienciaForm != null ? experienciaForm.nome : ''}" required></div>
                    <div class="form-group"><label for="grupoId">Grupo</label><select id="grupoId" name="grupoId" required><option value="">Selecionar</option><option th:each="grupo : ${grupos}" th:value="${grupo.id}" th:selected="${experienciaForm != null and experienciaForm.grupoId == grupo.id}" th:text="${grupo.nome}">Grupo</option></select></div>
                    <div class="form-group full-width"><label for="descricao">Descrição</label><textarea id="descricao" name="descricao" th:text="${experienciaForm != null ? experienciaForm.descricao : ''}"></textarea></div>
                </div>
                <div class="form-actions" style="margin-top:16px"><button class="btn btn-primary" type="submit">Guardar</button><a class="btn btn-secondary" th:href="@{/professor/experiencias}">Cancelar</a></div>
            </form>
        </section>

    </main>
</div>
</body>
</html>
