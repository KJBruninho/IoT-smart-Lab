<!DOCTYPE html>
<html lang="pt"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>

<aside th:fragment="sidebar(paginaAtual)" class="aluno-sidebar">

    <div class="sidebar-logo">
        <span class="logo-mark">IoT</span>
        <strong>Aluno</strong>
    </div>

    <nav class="sidebar-nav">

        <a th:href="@{/aluno}"
           th:classappend="${paginaAtual == 'dashboard'} ? ' active' : ''">
            <span>Dashboard</span>
        </a>

        <a th:href="@{/aluno/dados}"
           th:classappend="${paginaAtual == 'dados'} ? ' active' : ''">
            <span>Dados</span>
        </a>

        <a th:href="@{/aluno/pedidos}"
           th:classappend="${paginaAtual == 'pedidos'} ? ' active' : ''">
            <span>Pedidos de modos</span>
        </a>

        <a th:href="@{/aluno/pessoal}"
           th:classappend="${paginaAtual == 'pessoal'} ? ' active' : ''">
            <span>Área pessoal</span>
        </a>

    </nav>

    <div class="sidebar-footer">


        <a class="sidebar-switch-link"
           th:href="@{/professor}"
           sec:authorize="hasAnyAuthority('ROLE_PROFESSOR','PROFESSOR')">
            <span>Área Professor</span>
        </a>

        <a class="sidebar-switch-link"
           th:href="@{/admin}"
           sec:authorize="hasAnyAuthority('ROLE_ADMIN','ADMIN')">
            <span>Área Admin</span>
        </a>

		<a th:href="@{/auth/logout}" class="sidebar-logout-button">
		    <span class="nav-icon">⏻</span>
		    <span>Sair</span>
		</a>

    </div>

</aside>

</body>
</html>
