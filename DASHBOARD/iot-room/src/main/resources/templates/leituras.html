<!DOCTYPE html><html lang="pt" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Leituras</title><link rel="stylesheet" th:href="@{/css/dashboard.css}"></head><body><aside class="sidebar"><div class="brand"><div class="brand-icon">🌿</div><div><h1>IoT Room</h1><span>Qualidade ambiental</span></div></div><nav><a href="/dashboard">Dashboard</a><a href="/estacoes">Estações</a><a href="/sensores">Sensores</a><a href="/leituras" class="active">Leituras</a></nav></aside><main class="main-content"><header class="topbar"><div><h2>Leituras</h2><p>Últimos dados recebidos via MQTT</p></div></header><section class="panel"><table><thead><tr><th>ID</th><th>Estação</th><th>Sensor</th><th>Tipo</th><th>Valor</th><th>Unidade</th><th>Data</th></tr></thead><tbody><tr th:each="l : ${leituras}"><td th:text="${l.id}">1</td><td th:text="${l.sensor.estacao.nome}">Estação</td><td th:text="${l.sensor.nome}">Sensor</td><td><span class="tag" th:text="${l.sensor.tipo}">Tipo</span></td><td th:text="${l.valor}">0</td><td th:text="${l.sensor.unidade}">ppm</td><td th:text="${#temporals.format(l.registadoEm, 'dd/MM/yyyy HH:mm:ss')}">Data</td></tr></tbody></table></section></main></body></html>
