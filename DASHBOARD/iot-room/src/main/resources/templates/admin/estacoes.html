<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin | Estações</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="admin-layout">

    <div th:replace="~{fragments/admin-sidebar :: adminSidebar(${paginaAtiva})}"></div>

    <main class="admin-main">

        <header class="admin-topbar admin-topbar-actions">
            <div>
                <h1>Estações</h1>
                <p>Gestão das estações ESP32 registadas na plataforma.</p>
            </div>

            <a class="btn btn-primary" th:href="@{/admin/estacoes/novo}">
                Nova estação
            </a>
        </header>

        <section th:if="${mensagemSucesso}" class="alert alert-success">
            <span th:text="${mensagemSucesso}"></span>
        </section>

        <section th:if="${mensagemErro}" class="alert alert-error">
            <span th:text="${mensagemErro}"></span>
        </section>

        <section class="admin-panel">
            <form class="filter-form" th:action="@{/admin/estacoes}" method="get">

                <div class="form-group">
                    <label for="termo">Pesquisar</label>
                    <input id="termo"
                           type="text"
                           name="termo"
                           placeholder="Nome, device ID ou localização"
                           th:value="${termo}">
                </div>

                <div class="form-group">
                    <label for="estado">Estado</label>
                    <select id="estado" name="estado">
                        <option value="">Todas</option>
                        <option value="ativa" th:selected="${estado == 'ativa'}">Ativas</option>
                        <option value="inativa" th:selected="${estado == 'inativa'}">Inativas</option>
                    </select>
                </div>

                <div class="filter-actions">
                    <button type="submit" class="btn btn-primary">Filtrar</button>
                    <a th:href="@{/admin/estacoes}" class="btn btn-secondary">Limpar</a>
                </div>

            </form>
        </section>

        <section class="admin-panel">

            <div class="panel-header">
                <h2>Lista de estações</h2>
                <span class="muted">
                    Total:
                    <strong th:text="${#lists.size(estacoes)}">0</strong>
                </span>
            </div>

            <div class="empty-state" th:if="${#lists.isEmpty(estacoes)}">
                Nenhuma estação encontrada.
            </div>

            <table class="admin-table" th:if="${!#lists.isEmpty(estacoes)}">
                <thead>
                <tr>
                    <th>Estação</th>
                    <th>Device ID</th>
                    <th>Localização</th>
                    <th>Sensores</th>
                    <th>Estado</th>
                    <th>Última leitura</th>
                    <th>Criada em</th>
                    <th class="actions-column">Ações</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="estacao : ${estacoes}">
                    <td>
                        <strong th:text="${estacao.nome()}">Estação</strong>
                    </td>

                    <td>
                        <code th:text="${estacao.deviceId()}">esp32_001</code>
                    </td>

                    <td class="muted"
                        th:text="${estacao.localizacao() != null && !estacao.localizacao().isBlank() ? estacao.localizacao() : '-'}">
                        -
                    </td>

                    <td>
                        <span class="badge badge-info" th:text="${estacao.totalSensores()}">0</span>
                    </td>

                    <td>
                        <span class="status-pill"
                              th:classappend="${estacao.ativa()} ? 'status-active' : 'status-inactive'"
                              th:text="${estacao.ativa()} ? 'Ativa' : 'Inativa'">
                            Ativa
                        </span>
                    </td>

                    <td th:text="${estacao.ultimaLeituraEm() != null ? #temporals.format(estacao.ultimaLeituraEm(), 'dd/MM/yyyy HH:mm:ss') : 'Sem dados'}">
                        Sem dados
                    </td>

                    <td th:text="${estacao.criadaEm() != null ? #temporals.format(estacao.criadaEm(), 'dd/MM/yyyy HH:mm') : '-'}">
                        -
                    </td>

                    <td class="table-actions">
                        <a class="btn btn-small btn-primary"
                           th:href="@{/admin/sensores(estacaoId=${estacao.id()})}">
                            Sensores
                        </a>

                        <a class="btn btn-small btn-secondary"
                           th:href="@{/admin/estacoes/{id}/editar(id=${estacao.id()})}">
                            Editar
                        </a>

                        <form th:action="@{/admin/estacoes/{id}/estado(id=${estacao.id()})}"
                              method="post"
                              class="inline-form">
                            <button type="submit"
                                    class="btn btn-small"
                                    th:classappend="${estacao.ativa()} ? 'btn-danger' : 'btn-success'"
                                    th:text="${estacao.ativa()} ? 'Desativar' : 'Ativar'">
                                Alterar
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>

        </section>

    </main>
</div>

</body>
</html>
