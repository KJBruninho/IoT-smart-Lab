<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${modo == 'editar'} ? 'Admin | Editar sensor' : 'Admin | Novo sensor'">
        Admin | Sensor
    </title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="admin-layout">

    <div th:replace="~{fragments/admin-sidebar :: adminSidebar(${paginaAtiva})}"></div>

    <main class="admin-main">

        <header class="admin-topbar admin-topbar-actions">
            <div>
                <h1 th:text="${modo == 'editar'} ? 'Editar sensor' : 'Novo sensor'">
                    Sensor
                </h1>
                <p th:text="${modo == 'editar'} ? 'Atualiza dados, calibração e intervalos do sensor.' : 'Cria um novo sensor associado a uma estação.'">
                    Gestão de sensor.
                </p>
            </div>

            <a class="btn btn-secondary" th:href="@{/admin/sensores}">
                Voltar
            </a>
        </header>

        <section th:if="${mensagemErro}" class="alert alert-error">
            <span th:text="${mensagemErro}"></span>
        </section>

        <section class="admin-panel form-panel-wide">

            <form th:object="${form}"
                  th:action="${modo == 'editar'} ? @{/admin/sensores/{id}(id=${form.id})} : @{/admin/sensores}"
                  method="post">

                <h2 class="form-section-title">Identificação</h2>

                <div class="form-grid">

                    <div class="form-group">
                        <label for="nome">Nome do sensor</label>
                        <input id="nome"
                               type="text"
                               th:field="*{nome}"
                               placeholder="Ex: Sensor TDS"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="estacaoId">Estação</label>
                        <select id="estacaoId" th:field="*{estacaoId}" required>
                            <option value="">Selecionar estação</option>
                            <option th:each="estacao : ${estacoes}"
                                    th:value="${estacao.id()}"
                                    th:text="${estacao.nome() + ' (' + estacao.deviceId() + ')'}">
                                Estação
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="tipo">Tipo</label>
                        <select id="tipo" th:field="*{tipo}" required>
                            <option value="TEMPERATURA">Temperatura</option>
                            <option value="TDS">TDS</option>
                            <option value="PH">pH</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="unidade">Unidade</label>
                        <input id="unidade"
                               type="text"
                               th:field="*{unidade}"
                               placeholder="ºC, ppm ou pH"
                               required>
                    </div>

                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" th:field="*{ativo}">
                            Sensor ativo na BD
                        </label>
                    </div>

                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" th:field="*{remotoAtivo}">
                            Sensor ativo no ESP32
                        </label>
                    </div>

                </div>

                <h2 class="form-section-title">Calibração</h2>

                <div class="form-grid">

                    <div class="form-group">
                        <label for="fatorCalibracao">Fator de calibração</label>
                        <input id="fatorCalibracao"
                               type="number"
                               step="0.000001"
                               th:field="*{fatorCalibracao}"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="offsetCalibracao">Offset de calibração</label>
                        <input id="offsetCalibracao"
                               type="number"
                               step="0.000001"
                               th:field="*{offsetCalibracao}"
                               required>
                    </div>

                </div>

                <h2 class="form-section-title">Modo adaptativo</h2>

                <div class="form-grid">

                    <div class="form-group">
                        <label for="intervaloRapidoMs">Intervalo rápido</label>
                        <input id="intervaloRapidoMs"
                               type="number"
                               min="1000"
                               step="100"
                               th:field="*{intervaloRapidoMs}"
                               required>
                        <small class="muted">Usado quando há mudança significativa. Ex: 1000 ms.</small>
                    </div>

                    <div class="form-group">
                        <label for="intervaloEstavelMs">Intervalo estável</label>
                        <input id="intervaloEstavelMs"
                               type="number"
                               min="1000"
                               step="100"
                               th:field="*{intervaloEstavelMs}"
                               required>
                        <small class="muted">Usado quando os valores estão estáveis. Ex: 30000 ms.</small>
                    </div>

                    <div class="form-group">
                        <label for="duracaoModoRapidoMs">Duração do modo rápido</label>
                        <input id="duracaoModoRapidoMs"
                               type="number"
                               min="1000"
                               step="1000"
                               th:field="*{duracaoModoRapidoMs}"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="deltaSignificativo">Delta significativo</label>
                        <input id="deltaSignificativo"
                               type="number"
                               min="0"
                               step="0.0001"
                               th:field="*{deltaSignificativo}"
                               required>
                        <small class="muted">Mudança mínima para entrar em envio rápido.</small>
                    </div>

                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary"
                            th:text="${modo == 'editar'} ? 'Guardar alterações' : 'Criar sensor'">
                        Guardar
                    </button>

                    <a th:href="@{/admin/sensores}" class="btn btn-secondary">
                        Cancelar
                    </a>
                </div>

            </form>

        </section>

    </main>
</div>

</body>
</html>
