<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modo == 'editar'} ? 'Admin | Editar experiência' : 'Admin | Nova experiência'">
        Admin | Experiência
    </title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-page">

<div class="admin-layout">

    <div th:replace="~{fragments/admin-sidebar :: adminSidebar(${paginaAtiva})}"></div>

    <main class="admin-main">

        <header class="admin-topbar admin-topbar-actions">
            <div>
                <h1 th:text="${modo == 'editar'} ? 'Editar experiência' : 'Nova experiência'">
                    Experiência
                </h1>
                <p th:text="${modo == 'editar'} ? 'Atualiza os dados e estações da experiência.' : 'Cria uma experiência associada a um grupo e a uma ou mais estações.'">
                    Gestão de experiência.
                </p>
            </div>

            <a class="btn btn-secondary" th:href="@{/admin/experiencias}">
                Voltar
            </a>
        </header>

        <section th:if="${mensagemErro}" class="alert alert-error">
            <span th:text="${mensagemErro}"></span>
        </section>

        <section class="admin-panel form-panel-wide">

            <form th:object="${form}"
                  th:action="${modo == 'editar'} ? @{/admin/experiencias/{id}(id=${form.id})} : @{/admin/experiencias}"
                  method="post">

                <h2 class="form-section-title">Dados principais</h2>

                <div class="form-grid">

                    <div class="form-group">
                        <label for="nome">Nome da experiência</label>
                        <input id="nome"
                               type="text"
                               th:field="*{nome}"
                               placeholder="Ex: Monitorização de qualidade da água"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="grupoId">Grupo</label>
                        <select id="grupoId" th:field="*{grupoId}" required>
                            <option value="">Selecionar grupo</option>
                            <option th:each="grupo : ${grupos}"
                                    th:value="${grupo.id()}"
                                    th:text="${grupo.ativo()} ? ${grupo.nome()} : ${grupo.nome() + ' (inativo)'}">
                                Grupo
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="dataInicio">Data de início</label>
                        <input id="dataInicio"
                               type="datetime-local"
                               th:field="*{dataInicio}"
                               required>
                    </div>

                    <div class="form-group full-width">
                        <label for="descricao">Descrição</label>
                        <textarea id="descricao"
                                  th:field="*{descricao}"
                                  placeholder="Descrição opcional da experiência"></textarea>
                    </div>

                </div>

                <h2 class="form-section-title">Estações associadas</h2>

                <p class="muted">
                    Selecionar uma estação aqui também garante a permissão do grupo para essa estação.
                </p>

                <div class="empty-state" th:if="${#lists.isEmpty(estacoes)}">
                    Ainda não existem estações registadas.
                </div>

                <div class="selection-grid" th:if="${!#lists.isEmpty(estacoes)}">

                    <label class="selection-card"
                           th:each="estacao : ${estacoes}"
                           th:classappend="${form.estacaoIds != null && #lists.contains(form.estacaoIds, estacao.id())} ? 'selection-card-selected' : ''">

                        <div class="selection-card-main">
                            <input type="checkbox"
                                   name="estacaoIds"
                                   th:value="${estacao.id()}"
                                   th:checked="${form.estacaoIds != null && #lists.contains(form.estacaoIds, estacao.id())}">

                            <div>
                                <strong th:text="${estacao.nome()}">Estação</strong>

                                <p class="muted">
                                    Device ID:
                                    <code th:text="${estacao.deviceId()}">esp32</code>
                                </p>
                            </div>
                        </div>

                        <div class="selection-card-footer">
                            <span class="status-pill"
                                  th:classappend="${estacao.ativa()} ? 'status-active' : 'status-inactive'"
                                  th:text="${estacao.ativa()} ? 'Ativa' : 'Inativa'">
                                Ativa
                            </span>
                        </div>

                    </label>

                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary"
                            th:text="${modo == 'editar'} ? 'Guardar alterações' : 'Criar experiência'">
                        Guardar
                    </button>

                    <a th:href="@{/admin/experiencias}" class="btn btn-secondary">
                        Cancelar
                    </a>
                </div>

            </form>

        </section>

    </main>
</div>

</body>
</html>
