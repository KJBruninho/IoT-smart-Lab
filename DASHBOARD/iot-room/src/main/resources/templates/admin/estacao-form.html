<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modo == 'editar'} ? 'Admin | Editar estação' : 'Admin | Nova estação'">
        Admin | Estação
    </title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-page">

<div class="admin-layout">

    <div th:replace="~{fragments/admin-sidebar :: adminSidebar(${paginaAtiva})}"></div>

    <main class="admin-main">

        <header class="admin-topbar admin-topbar-actions">
            <div>
                <h1 th:text="${modo == 'editar'} ? 'Editar estação' : 'Nova estação'">
                    Estação
                </h1>
                <p th:text="${modo == 'editar'} ? 'Atualiza os dados da estação.' : 'Cria uma nova estação ESP32.'">
                    Gestão de estação.
                </p>
            </div>

            <a class="btn btn-secondary" th:href="@{/admin/estacoes}">
                Voltar
            </a>
        </header>

        <section th:if="${mensagemErro}" class="alert alert-error">
            <span th:text="${mensagemErro}"></span>
        </section>

        <section class="admin-panel form-panel">

            <form th:object="${form}"
                  th:action="${modo == 'editar'} ? @{/admin/estacoes/{id}(id=${form.id})} : @{/admin/estacoes}"
                  method="post">

                <div class="form-grid">

                    <div class="form-group">
                        <label for="nome">Nome da estação</label>
                        <input id="nome"
                               type="text"
                               th:field="*{nome}"
                               placeholder="Ex: Estação Sala 1"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="deviceId">Device ID</label>
                        <input id="deviceId"
                               type="text"
                               th:field="*{deviceId}"
                               placeholder="Ex: esp32_001"
                               required>
                    </div>

                    <div class="form-group full-width">
                        <label for="localizacao">Localização</label>
                        <input id="localizacao"
                               type="text"
                               th:field="*{localizacao}"
                               placeholder="Ex: Laboratório 2">
                    </div>

                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" th:field="*{ativa}">
                            Estação ativa
                        </label>
                    </div>

                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary"
                            th:text="${modo == 'editar'} ? 'Guardar alterações' : 'Criar estação'">
                        Guardar
                    </button>

                    <a th:href="@{/admin/estacoes}" class="btn btn-secondary">
                        Cancelar
                    </a>
                </div>

            </form>

        </section>

    </main>
</div>

</body>
</html>
