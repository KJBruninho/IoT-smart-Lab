<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin | Configurações</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="admin-layout">

    <div th:replace="~{fragments/admin-sidebar :: adminSidebar(${paginaAtiva})}"></div>

    <main class="admin-main">

        <header class="admin-topbar admin-topbar-actions">
            <div>
                <h1>Configurações</h1>
                <p>Configurações globais da plataforma IoT Room.</p>
            </div>
        </header>

        <section th:if="${mensagemSucesso}" class="alert alert-success">
            <span th:text="${mensagemSucesso}"></span>
        </section>

        <section th:if="${mensagemErro}" class="alert alert-error">
            <span th:text="${mensagemErro}"></span>
        </section>

        <form th:action="@{/admin/configuracoes}" th:object="${form}" method="post">

            <section class="admin-panel">
                <div class="panel-header">
                    <h2>Permissões e estado geral</h2>
                </div>

                <div class="form-grid">

                    <label class="checkbox-card">
                        <input type="checkbox" th:field="*{modoManutencao}">
                        <span>
                            <strong>Modo manutenção</strong>
                            <small>Permite bloquear funcionalidades enquanto fazes alterações.</small>
                        </span>
                    </label>

                    <label class="checkbox-card">
                        <input type="checkbox" th:field="*{permitirCalibracaoProfessor}">
                        <span>
                            <strong>Permitir calibração por professores</strong>
                            <small>Permite aos professores enviar novos fatores de calibração.</small>
                        </span>
                    </label>

                    <label class="checkbox-card">
                        <input type="checkbox" th:field="*{permitirControloRemotoProfessor}">
                        <span>
                            <strong>Permitir controlo remoto</strong>
                            <small>Permite ligar/desligar sensores remotamente.</small>
                        </span>
                    </label>

                    <label class="checkbox-card">
                        <input type="checkbox" th:field="*{permitirPedidosIntervalo}">
                        <span>
                            <strong>Permitir pedidos de intervalo</strong>
                            <small>Permite pedidos para alterar tempos de envio dos sensores.</small>
                        </span>
                    </label>

                </div>
            </section>

            <section class="admin-panel">
                <div class="panel-header">
                    <h2>Intervalos dos sensores</h2>
                </div>

                <div class="form-grid">

                    <div class="form-group">
                        <label>Intervalo mínimo (ms)</label>
                        <input type="number" th:field="*{intervaloMinimoMs}" min="500">
                    </div>

                    <div class="form-group">
                        <label>Intervalo máximo (ms)</label>
                        <input type="number" th:field="*{intervaloMaximoMs}" min="1000">
                    </div>

                    <div class="form-group">
                        <label>Intervalo rápido padrão (ms)</label>
                        <input type="number" th:field="*{intervaloRapidoPadraoMs}" min="500">
                    </div>

                    <div class="form-group">
                        <label>Intervalo estável padrão (ms)</label>
                        <input type="number" th:field="*{intervaloEstavelPadraoMs}" min="1000">
                    </div>

                    <div class="form-group">
                        <label>Duração modo rápido (ms)</label>
                        <input type="number" th:field="*{duracaoModoRapidoPadraoMs}" min="1000">
                    </div>

                    <div class="form-group">
                        <label>Timeout sem comunicação (segundos)</label>
                        <input type="number" th:field="*{timeoutSemComunicacaoSegundos}" min="10">
                    </div>

                </div>
            </section>

            <section class="admin-panel">
                <div class="panel-header">
                    <h2>MQTT</h2>
                </div>

                <div class="form-grid">

                    <div class="form-group">
                        <label>Host MQTT</label>
                        <input type="text" th:field="*{mqttHost}" placeholder="192.168.4.1">
                    </div>

                    <div class="form-group">
                        <label>Porta MQTT</label>
                        <input type="number" th:field="*{mqttPorta}" min="1" max="65535">
                    </div>

                    <div class="form-group">
                        <label>Tópico base</label>
                        <input type="text" th:field="*{mqttTopicoBase}" placeholder="esp32">
                    </div>

                </div>
            </section>

            <section class="admin-panel">
                <div class="panel-header">
                    <h2>Retenção de dados</h2>
                </div>

                <div class="form-grid">

                    <div class="form-group">
                        <label>Retenção de leituras (dias)</label>
                        <input type="number" th:field="*{retencaoLeiturasDias}" min="1">
                    </div>

                    <div class="form-group">
                        <label>Retenção de logs (dias)</label>
                        <input type="number" th:field="*{retencaoLogsDias}" min="1">
                    </div>

                </div>
            </section>

            <div class="form-actions">
                <a th:href="@{/admin}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">Guardar configurações</button>
            </div>

        </form>

    </main>
</div>

</body>
</html>
