<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${modo == 'editar'} ? 'Admin | Editar grupo' : 'Admin | Novo grupo'">
        Admin | Grupo
    </title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="admin-layout">

    <div th:replace="~{fragments/admin-sidebar :: adminSidebar(${paginaAtiva})}"></div>

    <main class="admin-main">

        <header class="admin-topbar admin-topbar-actions">
            <div>
                <h1 th:text="${modo == 'editar'} ? 'Editar grupo' : 'Novo grupo'">
                    Grupo
                </h1>
                <p th:text="${modo == 'editar'} ? 'Atualiza os dados do grupo.' : 'Cria um novo grupo para associar alunos, professores e estações.'">
                    Gestão de grupo.
                </p>
            </div>

            <a class="btn btn-secondary" th:href="@{/admin/grupos}">
                Voltar
            </a>
        </header>

        <section th:if="${mensagemErro}" class="alert alert-error">
            <span th:text="${mensagemErro}"></span>
        </section>

        <section class="admin-panel form-panel">

            <form th:object="${form}"
                  th:action="${modo == 'editar'} ? @{/admin/grupos/{id}(id=${form.id})} : @{/admin/grupos}"
                  method="post">

                <div class="form-grid">

                    <div class="form-group">
                        <label for="nome">Nome do grupo</label>
                        <input id="nome"
                               type="text"
                               th:field="*{nome}"
                               placeholder="Ex: Grupo A"
                               required>
                    </div>

                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" th:field="*{ativo}">
                            Grupo ativo
                        </label>
                    </div>

                    <div class="form-group full-width">
                        <label for="descricao">Descrição</label>
                        <textarea id="descricao"
                                  th:field="*{descricao}"
                                  placeholder="Descrição opcional do grupo"></textarea>
                    </div>

                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary"
                            th:text="${modo == 'editar'} ? 'Guardar alterações' : 'Criar grupo'">
                        Guardar
                    </button>

                    <a th:href="@{/admin/grupos}" class="btn btn-secondary">
                        Cancelar
                    </a>
                </div>

            </form>

        </section>

    </main>
</div>

</body>
</html>
