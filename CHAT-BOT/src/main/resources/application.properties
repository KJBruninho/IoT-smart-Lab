server.port=8091
spring.application.name=iot-assistant-api

spring.datasource.url=jdbc:mariadb://127.0.0.1:3306/iot_room?useUnicode=true&characterEncoding=utf8
spring.datasource.username=iot_user
spring.datasource.password=password
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

auth.api.base-url=http://127.0.0.1:8090

assistant.cors.allowed-origins=http://localhost:8081,http://127.0.0.1:8081,https://iotroom.paradise-byzantine.ts.net

logging.level.org.springframework.security=INFO
logging.level.com.iotroom.assistant=INFO

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true
spring.messages.encoding=UTF-8